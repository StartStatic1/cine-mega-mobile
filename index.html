<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cine Mega Mobile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body oncontextmenu="return false">

    <div id="home" class="page active">
        <div class="hero-container">
            <div class="hero-dots" id="hero-dots"></div>
            <div id="hero-wrapper"></div>
        </div>
        <div class="secao"><h2>🔥 TOP 10 SEMANA</h2><div id="top10" class="row"></div></div>
        <div class="secao"><h2>💀 BAÚ DO TRASH</h2><div id="trash" class="row"></div></div>
        <div class="secao"><h2>🎞️ CLÁSSICOS</h2><div id="classicos" class="row"></div></div>
    </div>

    <div id="detalhes" class="page">
        <div id="m-backdrop" class="detalhes-header">
            <button onclick="ir('home')" style="position:absolute; top:40px; left:20px; background:rgba(0,0,0,0.5); border:none; color:#fff; width:40px; height:40px; border-radius:50%;"><i class="fa fa-chevron-left"></i></button>
        </div>
        <div class="detalhes-body">
            <div style="display:flex; gap:15px; align-items:flex-end;">
                <img id="m-poster" style="width:115px; border-radius:8px; border:2px solid #000;">
                <h1 id="m-titulo" style="font-size:22px; margin-bottom:10px;"></h1>
            </div>
            <button onclick="window.open('https://api-scraper-cinema.onrender.com/buscar?titulo='+encodeURIComponent(filmeAtual))" style="width:100%; background:var(--red); color:#fff; padding:16px; border:none; border-radius:10px; font-weight:bold; margin:20px 0;">ASSISTIR AGORA</button>
            <div style="display:flex; justify-content:center; gap:25px;">
                <button onclick="abrirVLC()" class="btn-circle" style="background:#ff8800">VLC</button>
                <button onclick="abrirMX()" class="btn-circle" style="background:#0052d4">MX</button>
            </div>
            <h3>Sinopse</h3><p id="m-sinopse" style="color:#aaa; font-size:13px; line-height:1.5;"></p>
            <h3>Trailer</h3><div id="m-trailer"></div>
            <h3>Elenco</h3><div id="m-elenco" class="row"></div>
        </div>
    </div>

    <nav class="nav">
        <div onclick="ir('home')"><i class="fa fa-home" style="font-size:22px; color:var(--red);"></i></div>
        <div onclick="alert('Busca')"><i class="fa fa-search" style="font-size:22px; color:#444;"></i></div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
