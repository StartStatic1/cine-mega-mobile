<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cine Mega Mobile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body oncontextmenu="return false">

    <div class="header-top">
        <div class="logo">CINE MEGA</div>
        <div onclick="ir('buscaPage')"><i class="fa fa-search" style="font-size:20px; color:#fff;"></i></div>
    </div>

    <div id="home" class="page active">
        <div class="hero-container" style="height:80vh; position:relative;">
            <div id="hero-wrapper" style="display:flex; width:100%; height:100%; overflow-x:auto; scroll-snap-type: x mandatory; scrollbar-width:none;"></div>
        </div>
        <div class="secao"><h2>🔥 TOP 10 SEMANA</h2><div id="top10" class="row"></div></div>
        <div class="secao"><h2>🚀 LANÇAMENTOS</h2><div id="lancamentos" class="row"></div></div>
        <div class="secao"><h2>📅 EM BREVE (NO CINEMA)</h2><div id="embreve" class="row"></div></div>
    </div>

    <div id="buscaPage" class="page">
        <div style="padding:20px;">
            <input id="inputBusca" style="width:100%; padding:15px; border-radius:10px; background:#1a1a1a; border:none; color:#fff;" placeholder="O que vamos assistir?" onkeyup="buscar()">
        </div>
        <div id="resultados"></div>
    </div>

    <div id="detalhes" class="page">
        <div id="m-backdrop" style="height:35vh; background-size:cover; position:relative;">
            <button onclick="ir('home')" style="position:absolute; top:20px; left:20px; background:rgba(0,0,0,0.5); border:none; color:#fff; width:40px; height:40px; border-radius:50%;"><i class="fa fa-chevron-left"></i></button>
        </div>
        <div style="padding:20px;">
            <div style="display:flex; gap:15px; align-items:flex-end;">
                <img id="m-poster" style="width:115px; border-radius:8px; border:2px solid #000; margin-top:-60px; position:relative; z-index:10;">
                <h1 id="m-titulo" style="font-size:22px; margin-bottom:10px;"></h1>
            </div>
            <button onclick="window.open('https://api-scraper-cinema.onrender.com/buscar?titulo='+encodeURIComponent(filmeAtual))" style="width:100%; background:var(--red); color:#fff; padding:18px; border:none; border-radius:10px; font-weight:bold; margin:20px 0;">ASSISTIR AGORA</button>
            <div style="display:flex; justify-content:center; gap:30px;">
                <button onclick="abrirVLC()" class="btn-player" style="background:#ff8800;">VLC</button>
                <button onclick="abrirMX()" class="btn-player" style="background:#0052d4;">MX</button>
            </div>
            <h3>Sinopse</h3><p id="m-sinopse" style="color:#aaa; font-size:13px; line-height:1.5;"></p>
            <h3>Você pode gostar</h3><div id="m-sugestoes" class="row"></div>
        </div>
    </div>

    <nav style="position:fixed; bottom:0; width:100%; max-width:500px; height:70px; background:#0a0a0a; border-top:1px solid #111; display:flex; justify-content:space-around; align-items:center; z-index:2000;">
        <div onclick="ir('home')"><i class="fa fa-home" style="font-size:22px; color:var(--red);"></i></div>
        <div onclick="ir('buscaPage')"><i class="fa fa-search" style="font-size:22px; color:#444;"></i></div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
