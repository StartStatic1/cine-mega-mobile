<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cine Mega Mobile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="header-app"><div class="logo-top">CINE MEGA</div></div>

    <div id="home" class="page active">
        <div class="hero-container"><div id="hero-wrapper"></div></div>
        <div class="secao"><h2>🔥 TOP 10 SEMANA</h2><div id="top10" class="row"></div></div>
        <div class="secao"><h2>🚀 LANÇAMENTOS</h2><div id="lancamentos" class="row"></div></div>
        <div class="secao"><h2>📅 EM BREVE (2026+)</h2><div id="embreve" class="row"></div></div>
        <div class="secao"><h2>🎞️ CLÁSSICOS</h2><div id="classicos" class="row"></div></div>
        <div class="secao"><h2>💀 BAÚ DO TRASH</h2><div id="trash" class="row"></div></div>
    </div>

    <div id="buscaPage" class="page">
        <div style="padding:70px 15px 10px;"><input id="inputBusca" style="width:100%; padding:15px; border-radius:10px; background:#1a1a1a; border:none; color:#fff;" placeholder="Pesquisar filme..." oninput="buscar()"></div>
        <div id="resultados"></div>
    </div>

    <div id="detalhes" class="page detalhes-page">
        <button class="btn-back-clean" onclick="ir('home')"><i class="fa fa-chevron-left"></i></button>
        <div id="m-backdrop" class="detalhes-header"></div>
        <div style="padding:20px;">
            <div id="aviso-embreve" style="background:#ffcc00; color:#000; padding:10px; border-radius:5px; font-weight:bold; font-size:11px; text-align:center; margin-bottom:15px; display:none;">🍿 EM BREVE NO CINE MEGA.</div>
            <div style="display:flex; gap:15px; align-items:flex-end;"><img id="m-poster" style="width:110px; border-radius:8px; border:2px solid #000; margin-top:-60px; position:relative; z-index:100;"><h1 id="m-titulo" style="font-size:20px; margin:0;"></h1></div>
            <button id="btn-play-main" onclick="window.open('https://api-scraper-cinema.onrender.com/buscar?titulo='+encodeURIComponent(filmeAtual))" style="width:100%; color:#fff; padding:18px; border:none; border-radius:10px; font-weight:bold; margin:20px 0;">ASSISTIR AGORA</button>
            <div style="display:flex; justify-content:center; gap:25px;"><div onclick="abrirVLC()" style="width:55px; height:55px; border-radius:50%; background:#ff8800; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:14px;">VLC</div><div onclick="abrirMX()" style="width:55px; height:55px; border-radius:50%; background:#0052d4; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:14px;">MX</div></div>
            <h3>Sinopse</h3><p id="m-sinopse" style="color:#aaa; font-size:12px; line-height:1.5;"></p>
            <h3>Trailer</h3><div id="m-trailer"></div>
            <h3>Elenco</h3><div id="m-elenco" class="row"></div>
            <h3>Você pode gostar</h3><div id="m-rec" class="row"></div>
        </div>
    </div>

    <nav style="position:fixed; bottom:0; width:100%; height:75px; background:#080808; border-top:1px solid #111; display:flex; justify-content:space-around; align-items:center; z-index:2000;">
        <div onclick="ir('home')"><i class="fa fa-home" style="font-size:22px; color:var(--red);"></i></div>
        <div onclick="ir('buscaPage')"><i class="fa fa-search" style="font-size:22px; color:#444;"></i></div>
    </nav>
    <script src="app.js"></script>
</body>
</html>
