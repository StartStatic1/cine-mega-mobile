<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cine Mega VOD</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <h1>CINE MEGA</h1>
</header>

<!-- HOME -->
<div id="home" class="page active">
  <h2>🔥 Em Alta</h2>
  <div id="lista-populares" class="grid"></div>
</div>

<!-- BUSCA -->
<div id="buscar" class="page">
  <input type="text" id="inputBusca" placeholder="Buscar filme...">
  <button onclick="buscarFilme()">Buscar</button>
  <div id="resultados" class="grid"></div>
</div>

<!-- PLAYER -->
<div id="player" class="page">
  <h2 id="tituloFilme"></h2>
  <video id="video" controls></video>
</div>

<!-- NAV -->
<nav class="bottom-nav">
  <button onclick="ir('home')">🏠</button>
  <button onclick="ir('buscar')">🔍</button>
</nav>

<script src="app.js"></script>

</body>
</html>
