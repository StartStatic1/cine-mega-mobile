<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cine Mega VOD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false">

<div class="app">
    <header class="header">
        <div class="logo">CINE MEGA</div>
        <div class="search-bar">
            <input id="busca" placeholder="Buscar filmes..." onkeyup="if(event.key==='Enter') buscar()">
        </div>
    </header>

    <div id="home" class="page active">
        <div id="hero" class="hero">
            <div class="hero-content">
                <h1 id="hero-titulo" style="margin:0; font-size:24px;">Carregando...</h1>
                <button class="btn-play" style="width:auto; padding:10px 30px;" onclick="alert('Clique num filme para assistir')">ASSISTIR</button>
            </div>
        </div>

        <div class="secao">
            <h2>🔥 Top 10 da Semana</h2>
            <div id="top10" class="row"></div>
        </div>

        <div class="secao">
            <h2>📅 Vai Estrear</h2>
            <div id="estreias" class="row"></div>
        </div>
    </div>

    <div id="buscaPage" class="page">
        <h2 style="padding:15px 0 0 15px">Resultados da busca</h2>
        <div id="resultados" class="grid"></div>
    </div>

    <div id="detalhes" class="page">
        <div id="backdrop" class="backdrop">
            <button class="fechar" onclick="ir('home')" style="position:absolute; top:70px; left:20px; background:rgba(0,0,0,0.5); border:none; color:#fff; padding:10px; border-radius:50%">✕</button>
        </div>

        <div class="detalhes-content">
            <img id="poster">
            <h1 id="titulo" style="margin:10px 0 5px 0"></h1>
            <p id="meta" style="color:#ffcc00; margin:0 0 15px 0"></p>

            <button class="btn-play" onclick="play()">▶ REPRODUZIR AGORA</button>

            <div class="players-grid">
                <button onclick="abrirVLC()" style="background:#ff8800">VLC PLAYER</button>
                <button onclick="abrirMX()" style="background:#0052d4">MX PLAYER</button>
            </div>

            <h3 style="margin-top:25px">Sinopse</h3>
            <p id="sinopse" style="color:#bbb; line-height:1.5; font-size:14px;"></p>

            <h3>Você pode gostar</h3>
            <div id="recomendados" class="row"></div>
        </div>
    </div>

    <nav class="nav">
        <button id="btnHome" class="active" onclick="ir('home')">🏠</button>
        <button onclick="ir('buscaPage')">🔍</button>
        <button onclick="alert('Em breve: Categorias')">🗂️</button>
    </nav>
</div>

<script src="app.js"></script>
</body>
</html>
