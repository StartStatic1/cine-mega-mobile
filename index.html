<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cine Mega</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>

<body oncontextmenu="return false">

<div class="app">

<!-- HEADER -->
<header class="header">
  <div class="logo">CINE MEGA</div>
  <input id="busca" placeholder="Buscar filme..." onkeyup="if(event.key==='Enter') buscar()">
</header>

<!-- HOME -->
<div id="home" class="page active">

  <div id="hero" class="hero"></div>

  <div class="secao">
    <h2>🔥 Top 10</h2>
    <div id="top10" class="row"></div>
  </div>

  <div class="secao">
    <h2>🎬 Estreias</h2>
    <div id="estreias" class="row"></div>
  </div>

</div>

<!-- BUSCA -->
<div id="buscaPage" class="page">
  <div id="resultados" class="grid"></div>
</div>

<!-- DETALHES -->
<div id="detalhes" class="page">
  <div id="backdrop" class="backdrop"></div>

  <div class="detalhes-content">
    <img id="poster">

    <h1 id="titulo"></h1>
    <p id="meta"></p>

    <button class="btn-play" onclick="play()">▶ ASSISTIR</button>

    <div class="players">
      <button onclick="abrirVLC()">VLC</button>
      <button onclick="abrirMX()">MX</button>
    </div>

    <h3>Sinopse</h3>
    <p id="sinopse"></p>

    <h3>Você pode gostar</h3>
    <div id="recomendados" class="row"></div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button onclick="ir('home')">🏠</button>
  <button onclick="ir('buscaPage')">🔍</button>
</nav>

</div>

<script src="app.js"></script>
</body>
</html>
