<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cine Mega VOD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body oncontextmenu="return false">

<div class="app">
    <header class="header">
        <div class="logo">CINE MEGA</div>
        <div class="search-trigger" onclick="ir('buscaPage')"><i class="fa fa-search"></i></div>
    </header>

    <div id="home" class="page active">
        <div id="hero" class="hero">
            <div class="hero-content">
                <h1 id="hero-titulo">---</h1>
                <p id="hero-sinopse">---</p>
                <div class="hero-btns">
                    <button class="btn-hero-play" onclick="playHero()"><i class="fa fa-play"></i> Assistir</button>
                    <button class="btn-hero-info" onclick="infoHero()"><i class="fa fa-info-circle"></i> Info</button>
                </div>
                <div class="hero-dots" id="hero-dots"></div>
            </div>
        </div>

        <div class="secao">
            <div class="titulo-row">
                <h2>🔥 TOP 10 SEMANA</h2>
                <i class="fa fa-chevron-right"></i>
            </div>
            <div id="top10" class="row"></div>
        </div>

        <div class="secao">
            <div class="titulo-row">
                <h2>📂 CATEGORIAS</h2>
                <i class="fa fa-chevron-right" onclick="alert('Ver todos os gêneros')"></i>
            </div>
            <div id="generos" class="row">
                <div class="card-genero" onclick="buscarGenero(27)">Terror</div>
                <div class="card-genero" onclick="buscarGenero(28)">Ação</div>
                <div class="card-genero" onclick="buscarGenero(35)">Comédia</div>
                <div class="card-genero" onclick="buscarGenero(80)">Crime</div>
                <div class="card-genero-more"><i class="fa fa-arrow-right"></i></div>
            </div>
        </div>
    </div>

    <div id="buscaPage" class="page">
        <div class="busca-header">
            <input id="busca" placeholder="O que você quer assistir?" onkeyup="if(event.key==='Enter') buscar()">
            <button onclick="buscar()"><i class="fa fa-search"></i></button>
        </div>
        <div id="resultados" class="grid-search"></div>
    </div>

    <div id="detalhes" class="page">
        <div id="backdrop" class="backdrop">
            <div class="back-btn" onclick="fecharDetalhes()"><i class="fa fa-arrow-left"></i></div>
        </div>
        <div class="detalhes-content">
            <div class="main-info">
                <img id="poster" class="poster-float">
                <div class="text-info">
                    <h1 id="titulo"></h1>
                    <p id="meta"></p>
                </div>
            </div>
            <button class="btn-play-vod" onclick="play()"><i class="fa fa-play"></i> REPRODUZIR AGORA</button>
            <div class="external-players">
                <button onclick="abrirVLC()" class="vlc"><i class="fa fa-play-circle"></i> VLC</button>
                <button onclick="abrirMX()" class="mx"><i class="fa fa-play-circle"></i> MX</button>
            </div>
            <h3>Sinopse</h3>
            <p id="sinopse"></p>
            <h3>Sugestões</h3>
            <div id="recomendados" class="row"></div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="ir('home')"><i class="fa fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="ir('buscaPage')"><i class="fa fa-search"></i><span>Busca</span></div>
        <div class="nav-item" onclick="alert('Explorar')"><i class="fa fa-compass"></i><span>Explorar</span></div>
    </nav>
</div>

<script src="app.js"></script>
</body>
</html>
